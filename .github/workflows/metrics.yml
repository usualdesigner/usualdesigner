name: Metrics

on:
  # Regenerate once a day
  schedule:
    - cron: "0 0 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Refresh whenever main changes
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Classic PAT (public data only — no scopes needed). The profile is
          # public-facing, so private-repo data is intentionally excluded.
          token: ${{ secrets.METRICS_TOKEN }}
          # Commit the generated SVG with the repo's built-in token (default),
          # keeping the PAT scoped to data fetching only.
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: usualdesigner
          filename: github-metrics.svg
          template: classic
          # Headline numbers only — languages live in the top-languages card.
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York
          # A single flaky plugin should never fail the whole run.
          plugins_errors_fatal: no
