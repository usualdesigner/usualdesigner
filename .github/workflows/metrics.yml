name: Metrics

on:
  # Regenerate once a day
  schedule:
    - cron: "0 0 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Refresh whenever main changes
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Classic PAT (repo scope) so private-repo data is included in stats.
          token: ${{ secrets.METRICS_TOKEN }}
          # Commit the generated SVG with the repo's built-in token (default),
          # keeping the PAT scoped to data fetching only.
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: usualdesigner
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York

          # Top languages
          plugin_languages: yes
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          # Isometric commit calendar (activity heatmap)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Achievements
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0
